name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ${{ github.ref_name }}
        uses: actions/checkout@v6

      - name: Setting up pnpm
        uses: pnpm/action-setup@v4

      - name: Setting up nodejs
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install packages
        run: pnpm i

      - name: Format
        run: pnpm format

      - name: Lint
        run: pnpm lint

  frontend:
    defaults:
      run:
        working-directory: ./frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ${{ github.ref_name }}
        uses: actions/checkout@v6

      - name: Setting up pnpm
        uses: pnpm/action-setup@v4

      - name: Setting up nodejs
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install packages
        run: pnpm i

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test --if-present

  backend:
    defaults:
      run:
        working-directory: ./backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ${{ github.ref_name }}
        uses: actions/checkout@v6

      - name: Setting up pnpm
        uses: pnpm/action-setup@v4

      - name: Setting up nodejs
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install packages
        run: pnpm i

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test --if-present
